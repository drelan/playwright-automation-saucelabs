name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Credentials are also stored in GitHub, under Repo → Settings → Secrets and variables → Actions for GitHub Action CI to run.
      # config/environments.ts requires them via requireEnv(), 
      # and since .env is gitignored it was creating issue (although local run it works fine). So by storing in GitHub, CI pipelines would find them.
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      LOCKED_USER: ${{ secrets.LOCKED_USER }}
      LOCKED_PASSWORD: ${{ secrets.LOCKED_PASSWORD }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/html/
        retention-days: 30
